name: CI Orchestrator

on:
  push:
    branches:
      - main
    paths:
      - "orchestrator/**"
      - "api/**"
      - ".github/workflows/ci-orchestrator.yml"
  pull_request:
    branches:
      - main
    paths:
      - "orchestrator/**"
      - "api/**"
      - ".github/workflows/ci-orchestrator.yml"

defaults:
  run:
    working-directory: orchestrator

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: pdo, pdo_mysql, pdo_pgsql, redis, sodium, dom, curl, zip
          coverage: none
          tools: composer:v2
      - name: Cache Composer Packages
        uses: setup-node@v5
        with:
          path: orchestrator/vendor
          key: composer-8_4-${{ hashFiles('orchestrator/composer.lock') }}
          restore-keys: composer-8_4-
      - name: Install Dependecies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader
      - name: Run Pint
        run: ./vendor/bin/pint --test

  test_mysql:
    name: Tests - MySQL ${{ matrix.mysql }} - PHP ${{ matrix.php }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4"]
        mysql: ["8.0"]
    services:
      mysql:
        image: mysql:${{ matrix.mysql }}
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: scfleet_test
        ports: ["3306:3306"]
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: pdo, pdo_mysql, pdo_pgsql, redis, sodium, dom, curl, zip
          coverage: xdebug
          tools: composer:v2
      - name: Cache Composer Packages
        uses: setup-node@v5
        with:
          path: orchestrator/vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('orchestrator/composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-
      - name: Install Dependecies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: orchestrator/package-lock.json
      - name: Install npm Dependencies
        run: npm install
      - name: Build frontend assets
        run: npm run build
      - name: Prepare .env.testing
        run: |
          cp .env.example .env.testing
          php artisan key:generate --env=testing
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: scfleet_test
          DB_USERNAME: root
          DB_PASSWORD: secret
      - name: Run Migrations
        run: php artisan migrate --env=testing --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: scfleet_test
          DB_USERNAME: root
          DB_PASSWORD: secret
      - name: Run Tests with Coverage
        run: |
          php artisan test \
            --env=testing \
            --coverage-clover=coverage.xml \
            --parallel
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: scfleet_test
          DB_USERNAME: root
          DB_PASSWORD: secret
      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        if: matrix.mysql == '8.0'
        with:
          files: orchestrator/coverage.xml
          flags: orchestrator-mysql
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  test_pgsql:
    name: Tests - PostgreSQL ${{ matrix.psql }} - PHP ${{ matrix.php }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4"]
        pgsql: ["15"]
    services:
      postgres:
        image: postgres:${{ matrix.pgsql }}
        env:
          POSTGRES_USER: scfleet
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: scfleet_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U reviewradar"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_mysql, pdo_pgsql, redis, sodium, dom, curl, zip
          coverage: xdebug
          tools: composer:v2
      - name: Cache Composer Packages
        uses: setup-node@v5
        with:
          path: orchestrator/vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('orchestrator/composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-
      - name: Install Dependecies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: orchestrator/package-lock.json
      - name: Install npm Dependencies
        run: npm install
      - name: Build frontend assets
        run: npm run build
      - name: Prepare .env.testing
        run: |
          cp .env.example .env.testing
          php artisan key:generate --env=testing
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: scfleet_test
          DB_USERNAME: scfleet
          DB_PASSWORD: secret
      - name: Run Migrations
        run: php artisan migrate --env=testing --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: scfleet_test
          DB_USERNAME: scfleet
          DB_PASSWORD: secret
      - name: Run Tests with Coverage
        run: |
          php artisan test --env=testing --parallel
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: scfleet_test
          DB_USERNAME: scfleet
          DB_PASSWORD: secret

  frontend_lint:
    name: Lint Frontend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: orchestrator/package-lock.json
      - name: Install npm Dependencies
        run: npm install
      - name: Run linter
        run: npm run lint

  frontend_build:
    name: Build Frontend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: orchestrator/package-lock.json
      - name: Install npm Dependencies
        run: npm install
      - name: Build frontend assets
        run: npm run build
      - name: Check build output exists
        run: test -d public/build
